<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
<title>DentalFolio — Key Generator</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #38bdf8;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
        color: #94a3b8;
        max-width: 360px;
      }

      .badge {
        margin-top: 32px;
        display: inline-block;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 999px;
        padding: 6px 18px;
        font-size: 0.8rem;
        color: #64748b;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <h1>My App</h1>
    <p>Replace this content with your own HTML, CSS, and JavaScript. This file will be packaged into an Android APK automatically.</p>
    <span class="badge">Built with GitHub Actions</span>
  </body>
</html>
