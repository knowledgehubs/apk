# ============================================================
# REQUIRED DIRECTORY STRUCTURE
# ============================================================
# Place this file at: .github/workflows/android_build.yml
# Place your web app at: index.html (repository root)
#
# That's it — no Android project files needed in the repo.
# Everything else is generated dynamically by the runner.
# ============================================================

name: Build Android APK from index.html

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 1. Checkout repository
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # 2. Strict validation — fail fast if index.html is bad
      # -------------------------------------------------------
      - name: Validate index.html
        run: |
          echo "=============================================="
          echo "  VALIDATION: Checking index.html"
          echo "=============================================="

          if [ ! -f "index.html" ]; then
            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  BUILD FAILED                            ║"
            echo "║  index.html was NOT found in the repo    ║"
            echo "║  root. Please add it and push again.     ║"
            echo "╚══════════════════════════════════════════╝"
            exit 1
          fi
          echo "index.html exists."

          if [ ! -s "index.html" ]; then
            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  BUILD FAILED                            ║"
            echo "║  index.html is EMPTY. The file must      ║"
            echo "║  contain valid HTML content.             ║"
            echo "╚══════════════════════════════════════════╝"
            exit 1
          fi
          echo "index.html is not empty."

          if ! grep -qi "<html" index.html; then
            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  BUILD FAILED                            ║"
            echo "║  index.html does not contain an <html>   ║"
            echo "║  tag. The file must be valid HTML.       ║"
            echo "╚══════════════════════════════════════════╝"
            exit 1
          fi
          echo "index.html contains a valid <html> tag."
          echo ""
          echo "All validation checks passed. Proceeding with build."

      # -------------------------------------------------------
      # 3. Set up Java (required for Android SDK / Gradle)
      # -------------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -------------------------------------------------------
      # 4. Set up Node.js (required for Capacitor CLI)
      # -------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -------------------------------------------------------
      # 5. Install Android SDK command-line tools
      # -------------------------------------------------------
      - name: Install Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip

          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q "$CMDLINE_TOOLS_URL" -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept Android SDK licenses and install required packages
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # -------------------------------------------------------
      # 6. Create a temporary Capacitor project on the fly
      # -------------------------------------------------------
      - name: Initialize Capacitor project
        run: |
          BUILD_DIR="/tmp/cap-build"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"

          npm init -y > /dev/null
          npm install @capacitor/core @capacitor/cli @capacitor/android --save > /dev/null

          npx cap init "MyApp" "com.example.myapp" --web-dir www

          mkdir -p www
          cp "$GITHUB_WORKSPACE/index.html" www/index.html

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

      # -------------------------------------------------------
      # 7. Add Android platform and sync web assets
      # -------------------------------------------------------
      - name: Add Android platform and sync
        run: |
          cd "$BUILD_DIR"
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          npx cap add android
          npx cap sync android

      # -------------------------------------------------------
      # 8. Build the Debug APK with Gradle
      # -------------------------------------------------------
      - name: Build Debug APK
        run: |
          cd "$BUILD_DIR/android"
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --quiet

      # -------------------------------------------------------
      # 9. Locate the APK and copy it to the workspace
      # -------------------------------------------------------
      - name: Locate and stage APK
        run: |
          APK_PATH=$(find "$BUILD_DIR/android" -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found after build — Gradle may have failed silently."
            exit 1
          fi
          echo "APK found at: $APK_PATH"
          mkdir -p "$GITHUB_WORKSPACE/apk-output"
          cp "$APK_PATH" "$GITHUB_WORKSPACE/apk-output/app-debug.apk"

      # -------------------------------------------------------
      # 10. Upload the APK as a downloadable GitHub artifact
      # -------------------------------------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apk-output/app-debug.apk
          retention-days: 30
